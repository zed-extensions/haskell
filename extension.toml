id = "haskell"
name = "Haskell"
description = "Haskell support."
version = "1.0.0"
schema_version = 1
authors = [
    "Pocæus <github@pocaeus.com>",
    "Lei <45155667+leifu1128@users.noreply.github.com>",
]
repository = "https://github.com/zed-extensions/haskell"

[language_servers.hls]
name = "Haskell Language Server"
languages = [
    "Haskell",
    "Cabal",
    "Literate Haskell",
    # "Alex", # https://github.com/haskell/haskell-language-server/issues/4820
]

[debug_adapters.haskell-debugger]

[grammars.haskell]
repository = "https://github.com/tree-sitter/tree-sitter-haskell"
commit = "c30d812bc90827f1a54106a25bc9a6307f5cdcec" # 0.23.1

[grammars.cabal]
repository = "https://gitlab.com/zweimach/tree-sitter-cabal/"
commit = "6f00f6d4883eb2eb650eea7cc1e95bd25e48419c"

[grammars.haskell_literate]
repository = "https://github.com/LaurentRDC/tree-sitter-haskell-literate"
commit = "8ad7bd1b1595f4cc1a4ccc775d4a3c460f43a596"

[grammars.alex]
repository = "https://github.com/brandonchinn178/tree-sitter-alex"
rev = "1b20e2e6592ccd859ae5e06649d8335d19cdb60c"
